<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>League Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        .subtitle {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--gold-mid);
            margin-bottom: 3rem;
            letter-spacing: 1px;
            text-align: center;
        }

        .league-prompt-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
            animation: fadeIn 0.5s ease-out;
        }

        .league-btn {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 280px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .league-btn:hover {
            transform: translateY(-5px);
            border-color: var(--gold-mid);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.05);
        }

        .league-btn h1 {
            margin: 0;
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .league-btn { padding: 3rem 1.5rem; }
            .league-btn h1 { font-size: 1.8rem; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="subtitle">Select Your League</div>
    <div class="league-prompt-container">
        <!-- Links directly to the new RDA-specific homepage -->
        <a href="rda-home.html" class="league-btn">
            <h1>Real Draft Association</h1>
        </a>
        <!-- Links directly to the new Drafters-specific homepage -->
        <a href="drafters-home.html" class="league-btn">
            <h1>Drafters 1v1</h1>
        </a>
    </div>
</body>
</html>
