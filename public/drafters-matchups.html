<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drafters 1v1 - Matchups</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        /* --- Drafters 1v1 Layout Overrides --- */
        /* Explicitly hide the global RDA nav injected by app.js to prevent duplicates */
        .nav-container:not(.drafters-nav) { display: none !important; }

        /* Match RDA Header Styling */
        h1 {
            text-align: center;
            margin-top: 2rem;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        /* Content Sections */
        .hub-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding-bottom: 4rem; 
            padding-top: 1rem; 
            animation: fadeIn 0.5s ease-out;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #eee;
            text-align: left;
            padding-left: 0.5rem;
            border-left: 4px solid var(--gold-mid);
            margin-top: 2rem;
        }

        /* --- Games Grid (Matchups) --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0 1rem;
        }

        .game-card {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            display: block; 
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: #555;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .games-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    
    <h1>Drafters 1v1</h1>

    <!-- Custom Drafters Navigation Bar (Identical styling to RDA) -->
    <div class="nav-container drafters-nav">
        <div class="nav-bar">
            <!-- Home button returns to Drafters Landing Page -->
            <a href="drafters-home.html" class="nav-button">Home</a>
            <a id="nav-matchups" href="#" class="nav-button active">Matchups</a>
            <a id="nav-players" href="#" class="nav-button">Players</a>
        </div>
    </div>

    <div class="hub-content">
        <!-- Season Header -->
        <div style="text-align: center; margin-bottom: 2rem; color: #888;">
            <span id="season-display" style="font-weight: bold; color: var(--gold-light); text-transform: uppercase; letter-spacing: 1px;">Loading Season...</span>
        </div>

        <!-- Matchups Content -->
        <h2 class="section-title" style="margin-left: 1rem;">Weekly Matchups</h2>
        <div class="games-grid" id="matchups-container">
            <div class="game-card" style="text-align: center; grid-column: 1/-1; padding: 3rem; color: #666; font-style: italic;">
                Matchup data will populate here.
            </div>
        </div>
    </div>

    <script type="module">
        // Grab the season from the URL
        const params = new URLSearchParams(window.location.search);
        const draftersSeason = params.get('season') || '0';
        
        document.getElementById('season-display').textContent = `Season ${draftersSeason}`;

        // Ensure the custom nav links retain the current season parameter
        document.getElementById('nav-matchups').href = `drafters-matchups.html?season=${draftersSeason}`;
        document.getElementById('nav-players').href = `drafters-players.html?season=${draftersSeason}`;

        // --- FUTURE DATA FETCHING SKELETON ---
        async function loadDraftersData() {
            // Your fetching logic for Drafters specific sheets will go here
        }

        loadDraftersData();
    </script>
</body>
</html>
