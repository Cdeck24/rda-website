<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drafters 1v1 - Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        /* --- Drafters 1v1 Layout Overrides --- */
        /* Explicitly hide the global RDA nav injected by app.js to prevent duplicates */
        .nav-container:not(.drafters-nav) { display: none !important; }

        /* Match RDA Header Styling */
        h1 {
            text-align: center;
            margin-top: 2rem;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        /* Content Sections */
        .hub-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding-bottom: 4rem; 
            padding-top: 1rem; 
            animation: fadeIn 0.5s ease-out;
        }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease-out; }

        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #eee;
            text-align: left;
            padding-left: 0.5rem;
            border-left: 4px solid var(--gold-mid);
            margin-top: 2rem;
        }

        /* --- Games Grid (Matchups) --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0 1rem;
        }

        .game-card {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            display: block; 
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: #555;
        }

        /* --- Player Table Styles --- */
        .data-table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #333;
            background: #0f0f0f;
            margin: 0 1rem;
        }

        .data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #222; }
        .data-table th { background: #1a1a1a; color: #888; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover { background: rgba(255, 255, 255, 0.03); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .games-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    
    <h1>Drafters 1v1</h1>

    <!-- Custom Drafters Navigation Bar (Identical styling to RDA) -->
    <div class="nav-container drafters-nav">
        <div class="nav-bar">
            <a href="index.html" class="nav-button">Home</a>
            <button id="nav-matchups" class="nav-button active" onclick="switchTab('matchups')">Matchups</button>
            <button id="nav-players" class="nav-button" onclick="switchTab('players')">Players</button>
        </div>
    </div>

    <div class="hub-content">
        <!-- Season Header -->
        <div style="text-align: center; margin-bottom: 2rem; color: #888;">
            <span id="season-display" style="font-weight: bold; color: var(--gold-light); text-transform: uppercase; letter-spacing: 1px;">Loading Season...</span>
        </div>

        <!-- TAB 1: Matchups -->
        <div id="tab-matchups" class="tab-pane active">
            <h2 class="section-title" style="margin-left: 1rem;">Weekly Matchups</h2>
            <div class="games-grid" id="matchups-container">
                <div class="game-card" style="text-align: center; grid-column: 1/-1; padding: 3rem; color: #666; font-style: italic;">
                    Matchup data will populate here.
                </div>
            </div>
        </div>

        <!-- TAB 2: Players -->
        <div id="tab-players" class="tab-pane">
            <h2 class="section-title" style="margin-left: 1rem;">Player Leaderboard</h2>
            <div class="data-table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Wins</th>
                            <th>Losses</th>
                            <th>Total Points</th>
                        </tr>
                    </thead>
                    <tbody id="players-container">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 3rem; color: #666; font-style: italic;">
                                Player data will populate here.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        // Grab the season from the URL
        const params = new URLSearchParams(window.location.search);
        const draftersSeason = params.get('season') || '0';
        
        document.getElementById('season-display').textContent = `Season ${draftersSeason}`;

        // Tab Switching Logic
        window.switchTab = function(tabName) {
            // Update Content Panes
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Update Nav Button Highlight
            document.querySelectorAll('.drafters-nav .nav-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${tabName}`).classList.add('active');
        };

        // --- FUTURE DATA FETCHING SKELETON ---
        async function loadDraftersData() {
            // Your fetching logic for Drafters specific sheets will go here
        }

        loadDraftersData();
    </script>
</body>
</html>
