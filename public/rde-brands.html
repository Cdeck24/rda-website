<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RDE - Brands</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles/drafters.css">
    <style>
        /* --- RDE Layout Overrides --- */
        html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
        .nav-container:not(.drafters-nav) { display: none !important; }

        .hub-content { width: 100%; max-width: 1200px; margin: 0 auto; padding: 1rem 1rem 4rem 1rem; animation: fadeIn 0.5s ease-out; box-sizing: border-box; }

        /* Headers */
        h1 { text-align: center; margin-top: 2rem; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold-mid); }
        h2.page-title { text-align: center; margin-top: 1rem; margin-bottom: 2rem; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); }
        
        .brand-detail-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 2.5rem;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-bottom: 3px solid var(--gold-mid);
            padding-bottom: 1rem;
            display: inline-flex;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        h2.section-heading {
            font-size: 1.4rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: var(--gold-mid);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 0.5rem;
        }

        /* --- Brand Grid Layout (Home View) --- */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto 3rem auto;
            padding: 0 1rem;
        }

        .brand-link {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 3rem 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Brand Specific Top Borders */
        .brand-link.prime-link { border-top: 4px solid #ef4444; }
        .brand-link.clash-link { border-top: 4px solid #3b82f6; }
        .brand-link.ascent-link { border-top: 4px solid #10b981; }

        .brand-link:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, rgba(51, 65, 85, 0.9), rgba(30, 41, 59, 0.95));
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: var(--gold-mid);
        }

        /* Logo Containers (White backdrops for visibility) */
        .brand-logo-wrapper {
            background: #f8fafc;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            padding: 1.2rem;
        }

        .brand-link:hover .brand-logo-wrapper { 
            transform: scale(1.1); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
        }

        .brand-logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .detail-logo-wrapper {
            background: #f8fafc;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        
        .detail-logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-link span {
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- Detail View Stats Cards --- */
        .brand-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .info-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .info-card .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .info-card .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }

        /* --- Roster Table --- */
        .data-table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-subtle); background: rgba(15, 23, 42, 0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .data-table { width: 100%; border-collapse: collapse; min-width: 600px; white-space: nowrap; }
        .data-table th, .data-table td { padding: 1rem 1.5rem; text-align: left; border-bottom: 1px solid var(--border-subtle); }
        .data-table th { background: rgba(0,0,0,0.3); color: var(--gold-mid); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover { background: rgba(255, 255, 255, 0.05); }

        .rank-number { font-weight: 600; color: var(--text-muted); width: 40px; text-align: center; }
        .rank-number.champ { font-size: 1.2rem; }
        .player-name { font-weight: 600; color: #fff; }
        .stat-highlight { color: var(--gold-mid); font-weight: 600; }

        /* Momentum & Rivalry Badges */
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge.hot { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .badge.cold { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .badge.steady { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
        
        .rivalry-text { color: #facc15; font-weight: 600; font-size: 0.85rem; }
        .no-rivalry { color: var(--text-muted); font-size: 0.85rem; font-style: italic; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            margin-top: 1rem; margin-bottom: 1rem;
            color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; background: transparent; border: 1px solid var(--border-subtle);
            padding: 0.5rem 1rem; border-radius: 6px; transition: all 0.2s ease;
        }
        .back-btn:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: var(--gold-mid); }

        @media (max-width: 768px) { 
            h1 { font-size: 1.8rem; margin-top: 1rem; } 
            h2.page-title { font-size: 1.5rem; }
            .brand-detail-header { font-size: 1.8rem; flex-direction: column; text-align: center; }
            .detail-logo-wrapper { width: 60px; height: 60px; padding: 0.5rem; }
            .data-table th, .data-table td { padding: 0.75rem 1rem; font-size: 0.85rem; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    
    <!-- Restored Main Header -->
    <h1 id="main-header">RDE</h1>

    <!-- Custom RDE Navigation Bar -->
    <div class="nav-container drafters-nav">
        <div class="nav-bar">
            <a href="drafters-home.html" class="nav-button">Seasons</a>
            <a href="rde-hub.html" class="nav-button">Hub</a>
            <a href="rde-brands.html" class="nav-button active">Brands</a>
            <a href="rde-events.html" class="nav-button">Events</a>
            <a href="rde-players.html" class="nav-button">Players</a>
        </div>
    </div>

    <!-- Main Container where JS will inject views -->
    <div class="hub-content" id="main-content">
        <div style="text-align: center; padding: 4rem; color: #888;">Loading Brands...</div>
    </div>

    <script type="module">
        const workerProxy = 'https://rda-worker.coledecker04.workers.dev/';
        const rosterCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTvGj0pSmJxr_ylOG7TOpgqkgFcLnorp5gLv9zoBQrvETJF7tSABn4dPtl4_jQLWAadJRsVslzHRYyI/pub?gid=0&single=true&output=csv';

        // --- DATA DEFINITIONS (Derived from Real Draft Entertainment PDF) ---
        const brandConfig = {
            'PRIME': {
                name: 'PRIME',
                color: '#ef4444', // Red
                desc: 'Main Roster — Flagship Division',
                gm: 'TBD', // Placeholder for Commissioner/GM dashboard assignment
                logo: 'images/RDE/prime-logo.png'
            },
            'CLASH': {
                name: 'CLASH',
                color: '#3b82f6', // Blue
                desc: 'Main Roster — Secondary Division',
                gm: 'TBD',
                logo: 'images/RDE/clash-logo.png'
            },
            'ASCENT': {
                name: 'ASCENT',
                color: '#10b981', // Green
                desc: 'Developmental Division',
                gm: 'TBD',
                logo: 'images/RDE/ascent-logo.png'
            }
        };

        let globalRosterData = [];

        // --- ROUTING LOGIC ---
        document.addEventListener('DOMContentLoaded', async () => {
            await loadRosterData();

            const params = new URLSearchParams(window.location.search);
            const brandParam = params.get('brand');
            
            if (brandParam && brandConfig[brandParam.toUpperCase()]) {
                renderBrandDetail(brandParam.toUpperCase());
            } else {
                renderBrandGrid();
            }
        });

        // 0. FETCH ROSTER FROM CSV
        async function loadRosterData() {
            try {
                const res = await fetch(workerProxy + '?url=' + encodeURIComponent(rosterCsvUrl));
                if (!res.ok) throw new Error('Network response was not ok');
                const text = await res.text();

                const rows = text.split('\n').map(line => {
                    const values = [];
                    let currentVal = '', inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"' && (i === 0 || line[i-1] !== '\\')) inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { values.push(currentVal.trim()); currentVal = ''; }
                        else currentVal += char;
                    }
                    values.push(currentVal.trim());
                    return values;
                }).filter(row => row.length > 0 && row.some(cell => cell.trim() !== ''));

                if (rows.length < 2) return;

                const headers = rows[0].map(h => h.toLowerCase().trim());
                
                const getVal = (row, colName) => {
                    const idx = headers.findIndex(h => h === colName);
                    return idx > -1 ? row[idx] : '';
                };

                globalRosterData = rows.slice(1).map(row => {
                    const brandRaw = getVal(row, 'brand');
                    const brand = brandRaw ? brandRaw.toUpperCase() : 'UNKNOWN';
                    
                    // Defaults/Fallbacks in case you add these columns to your CSV later
                    const momentum = getVal(row, 'momentum') || 'Steady';
                    const wins = parseInt(getVal(row, 'wins')) || 0;
                    const losses = parseInt(getVal(row, 'losses')) || 0;
                    const avg = parseFloat(getVal(row, 'avg score')) || parseFloat(getVal(row, 'avg')) || 0.00;
                    const rivalry = getVal(row, 'rivalry') || getVal(row, 'active rivalry') || 'None';
                    const isChamp = getVal(row, 'champion')?.toLowerCase() === 'yes' || getVal(row, 'is champ')?.toLowerCase() === 'true';

                    return {
                        username: getVal(row, 'username') || 'Unknown',
                        userId: getVal(row, 'user id') || '',
                        brand: brand,
                        momentum: momentum, 
                        wins: wins, 
                        losses: losses, 
                        avg: avg, 
                        rivalry: rivalry, 
                        isChamp: isChamp 
                    };
                });
            } catch (error) {
                console.error("Error loading Roster CSV:", error);
            }
        }

        // 1. GRID VIEW
        function renderBrandGrid() {
            const container = document.getElementById('main-content');
            
            let html = `<h2 class="page-title">RDE Brands</h2>`;
            html += `<div class="brand-grid">`;
            
            Object.values(brandConfig).forEach(brand => {
                html += `
                    <a href="rde-brands.html?brand=${brand.name}" class="brand-link ${brand.name.toLowerCase()}-link">
                        <div class="brand-logo-wrapper">
                            <img src="${brand.logo}" alt="${brand.name} Logo" onerror="this.parentElement.style.display='none'">
                        </div>
                        <span style="color: ${brand.color};">${brand.name}</span>
                    </a>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }

        // 2. DETAIL VIEW
        function renderBrandDetail(brandName) {
            const container = document.getElementById('main-content');
            const brand = brandConfig[brandName];
            
            // Filter roster and sort by rank/avg score
            let roster = globalRosterData.filter(p => p.brand === brandName);
            roster.sort((a, b) => b.avg - a.avg);

            let html = `
                <button class="back-btn" onclick="window.location.href='rde-brands.html'">
                    &larr; All Brands
                </button>
                
                <div style="text-align: center;">
                    <div class="brand-detail-header" style="border-bottom-color: ${brand.color};">
                        <div class="detail-logo-wrapper">
                            <img src="${brand.logo}" alt="${brand.name} Logo" onerror="this.parentElement.style.display='none'">
                        </div>
                        ${brand.name}
                    </div>
                </div>

                <div class="brand-info-grid">
                    <div class="info-card">
                        <div class="label">Division Type</div>
                        <div class="value" style="color: ${brand.color}; font-size: 1.1rem;">${brand.desc}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">General Manager</div>
                        <div class="value">${brand.gm}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Active Roster Size</div>
                        <div class="value">${roster.length} Superstars</div>
                    </div>
                </div>

                <h2 class="section-heading" style="color: ${brand.color}; border-bottom-color: rgba(255,255,255,0.1);">Active Roster & Rankings</h2>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="text-align: center;">Rank</th>
                                <th>Superstar</th>
                                <th style="text-align: center;">Momentum</th>
                                <th style="text-align: center;">Record</th>
                                <th>Active Rivalry</th>
                                <th style="text-align: right; padding-right: 1.5rem;">Avg Score</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (roster.length === 0) {
                html += `<tr><td colspan="6" style="text-align: center; padding: 3rem; color: #888; font-style: italic;">Roster data currently unavailable.</td></tr>`;
            } else {
                roster.forEach((p, index) => {
                    const rankDisplay = p.isChamp ? '<span title="Champion">👑</span>' : (index + 1);
                    const champClass = p.isChamp ? 'champ' : '';
                    
                    let momBadge = '';
                    if (p.momentum === 'Hot') momBadge = '<span class="badge hot">🔥 Hot</span>';
                    else if (p.momentum === 'Cold') momBadge = '<span class="badge cold">❄️ Cold</span>';
                    else momBadge = '<span class="badge steady">Steady</span>';

                    const rivalryDisplay = (p.rivalry && p.rivalry !== 'None') 
                        ? `<span class="rivalry-text">${p.rivalry}</span>` 
                        : `<span class="no-rivalry">-</span>`;

                    html += `
                        <tr>
                            <td class="rank-number ${champClass}">${rankDisplay}</td>
                            <td class="player-name">${p.username}</td>
                            <td style="text-align: center;">${momBadge}</td>
                            <td style="text-align: center; color: var(--text-muted);">${p.wins}-${p.losses}</td>
                            <td>${rivalryDisplay}</td>
                            <td class="stat-highlight" style="text-align: right; padding-right: 1.5rem;">${p.avg.toFixed(2)}</td>
                        </tr>
                    `;
                });
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }
    </script>
</body>
</html>
