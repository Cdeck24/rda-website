<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RDE - Brands</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="styles/drafters.css">
    <style>
        html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
        .nav-container:not(.drafters-nav) { display: none !important; }

        h1 { text-align: center; margin-top: 2rem; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold-mid); }
        .hub-content { width: 100%; max-width: 1200px; margin: 0 auto; padding: 1rem 1rem 4rem 1rem; animation: fadeIn 0.5s ease-out; box-sizing: border-box; }

        /* Brand Grid */
        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .brand-column {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .brand-header {
            padding: 1.5rem; text-align: center; font-weight: 800; font-size: 1.5rem;
            text-transform: uppercase; letter-spacing: 3px; color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-column.prime .brand-header { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
        .brand-column.clash .brand-header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .brand-column.ascent .brand-header { background: linear-gradient(135deg, #064e3b, #10b981); }

        .roster-list { list-style: none; padding: 0; margin: 0; }
        
        .roster-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-subtle);
            transition: background 0.2s ease;
        }
        .roster-item:hover { background: rgba(255,255,255,0.05); }
        .roster-item:last-child { border-bottom: none; }

        .player-info { display: flex; align-items: center; gap: 1rem; }
        .rank { font-weight: 700; color: var(--text-muted); width: 20px; text-align: center; }
        .rank.champ { color: var(--gold-mid); font-size: 1.2rem; }
        .name { font-weight: 600; color: #fff; }

        /* Momentum Indicators */
        .momentum { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .momentum.hot { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .momentum.cold { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .momentum.steady { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }

        @media (max-width: 768px) { h1 { font-size: 1.8rem; margin-top: 1rem; } .brands-grid { grid-template-columns: 1fr; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    
    <h1 id="main-header">RDE</h1>

    <div class="nav-container drafters-nav">
        <div class="nav-bar">
            <a href="drafters-home.html" class="nav-button">Seasons</a>
            <a href="rde-hub.html" class="nav-button">Hub</a>
            <a href="rde-brands.html" class="nav-button active">Brands</a>
            <a href="rde-events.html" class="nav-button">Events</a>
            <a href="rde-players.html" class="nav-button">Players</a>
        </div>
    </div>

    <div class="hub-content">
        <div class="brands-grid">
            
            <!-- PRIME Brand -->
            <div class="brand-column prime">
                <div class="brand-header">PRIME</div>
                <ul class="roster-list">
                    <li class="roster-item">
                        <div class="player-info"><span class="rank champ">👑</span><span class="name">@gmoney676</span></div>
                        <span class="momentum hot">🔥 Hot</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">1</span><span class="name">@rafael</span></div>
                        <span class="momentum steady">Steady</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">2</span><span class="name">@ok124</span></div>
                        <span class="momentum cold">❄️ Cold</span>
                    </li>
                </ul>
            </div>

            <!-- CLASH Brand -->
            <div class="brand-column clash">
                <div class="brand-header">CLASH</div>
                <ul class="roster-list">
                    <li class="roster-item">
                        <div class="player-info"><span class="rank champ">👑</span><span class="name">@alpunc</span></div>
                        <span class="momentum steady">Steady</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">1</span><span class="name">@realkam</span></div>
                        <span class="momentum hot">🔥 Hot</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">2</span><span class="name">@warner3</span></div>
                        <span class="momentum cold">❄️ Cold</span>
                    </li>
                </ul>
            </div>

            <!-- ASCENT Brand -->
            <div class="brand-column ascent">
                <div class="brand-header">ASCENT</div>
                <ul class="roster-list">
                    <li class="roster-item">
                        <div class="player-info"><span class="rank champ">👑</span><span class="name">@bixz</span></div>
                        <span class="momentum hot">🔥 Hot</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">1</span><span class="name">@som.jr</span></div>
                        <span class="momentum steady">Steady</span>
                    </li>
                    <li class="roster-item">
                        <div class="player-info"><span class="rank">2</span><span class="name">@passionfruit</span></div>
                        <span class="momentum steady">Steady</span>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</body>
</html>
