<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RDA Live - Live Scores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        /* --- Page Specific Styles --- */
        body.modal-open { overflow: hidden; }

        /* Sub Navigation (Tabs) */
        .sub-nav-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.5s ease-out 0.2s both;
            flex-wrap: wrap;
        }

        .sub-nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .sub-nav-btn:hover { color: var(--text-main); }
        .sub-nav-btn.active { color: var(--gold-light); border-bottom: 2px solid var(--gold-mid); }

        /* Loading and Results */
        #loading {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 600px;
            color: var(--text-muted);
            font-size: 1.1rem;
            animation: pulse 1.5s ease-in-out infinite alternate
        }
      
        .content-view {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease-out;
        }
      
        .content-view.active { display: grid; }

        #results { grid-template-columns: 1fr; gap: 1rem; }

        /* --- Daily Leaderboard Styling --- */
        #leaderboard-results { display: none; width: 100%; }
        #leaderboard-results.active { display: block; }

        .leaderboard-card {
            margin-top: 1rem;
        }

        .leaderboard-header {
            background: linear-gradient(180deg, var(--bg-navy-light) 0%, var(--bg-navy) 100%);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gold);
        }

        .leaderboard-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: var(--gold-light); 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
        }

        .leaderboard-table-container { overflow-x: auto; }

        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th {
            background: rgba(0,0,0,0.2);
            color: var(--gold-mid);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }
        .leaderboard-table td { padding: 1rem; border-bottom: 1px solid var(--border-subtle); color: var(--text-main); font-size: 0.95rem; }
        .leaderboard-table tr:hover { background: rgba(255, 255, 255, 0.03); }

        .rank-cell { font-weight: bold; width: 60px; text-align: center; }
        .rank-1 { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .rank-2 { color: #C0C0C0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.3); }
        .rank-3 { color: #CD7F32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.3); }
        .score-cell { font-weight: 700; text-align: right; color: var(--gold-mid); }
        .team-cell { color: var(--text-muted); font-size: 0.8rem; }

        /* --- Team Matchup Dropdown Styles --- */
        .matchup-dropdown {
            margin-top: 1.5rem;
            padding: 0;
            background: var(--bg-navy-light);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
        }
        .matchup-dropdown:first-of-type { margin-top: 0; }

        .dropdown-header {
            display: grid;
            grid-template-columns: auto 1fr auto 1fr auto;
            gap: 0.5rem;
            align-items: center;
            padding: 1rem;
            cursor: pointer;
            background: transparent;
            transition: background 0.2s ease;
        }
        .dropdown-header:hover { background: rgba(255,255,255,0.03); }

        .header-logo-container {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      
        .header-team-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
      
        .header-team-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
      
        .header-team-name.away { text-align: left; }
        .header-team-name.home { text-align: right; }

        .header-center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 80px;
        }

        .header-scores-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .header-series-score { font-size: 1.2rem; font-weight: 700; text-align: center; }
        .header-series-score.winning-score { color: var(--gold-mid); }
        .header-dash { color: var(--text-muted); font-weight: 400; }

        .header-record { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); margin-top: 0.2rem; }
        .header-record .loading-text { font-size: 0.7rem; color: var(--text-muted); animation: pulse 1.5s ease-in-out infinite alternate; }
      
        .header-toggle-icon { font-size: 0.8rem; font-weight: 400; color: var(--text-muted); transition: transform 0.3s ease; display: inline-block; margin-left: 4px;}
        .dropdown-header.open .header-toggle-icon { transform: rotate(45deg); }

        .dropdown-content { display: none; padding: 1rem; padding-top: 0; background: transparent; border-top: 1px solid var(--border-subtle); }
        .dropdown-content.open { display: block; }

        /* Sport Score Card */
        .sport-card {
            margin-top: 0.75rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
        }
        .dropdown-content .sport-card:first-child { margin-top: 1rem; }

        .sport-card .score-details {
            padding: 0.25rem 0;
            display: grid;
            grid-template-columns: auto 1fr auto 1fr auto;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem; cursor: pointer; transition: background 0.2s ease; border-radius: 6px;
            margin: -0.5rem -0.5rem 1rem -0.5rem; padding: 0.5rem;
        }
        .sport-card .score-details:hover { background: rgba(255,255,255,0.05); }

        .sport-team-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sport-team-name.away { text-align: left; }
        .sport-team-name.home { text-align: right; }

        .sport-center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .sport-scores-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sport-card .team-score { font-size: 1.1rem; font-weight: 700; text-align: center; }
        .sport-card .team-score.winning-score { color: var(--gold-mid); }
        .sport-card .team-score.loading-score { font-size: 0.9rem; color: var(--text-muted); animation: pulse 1.5s ease-in-out infinite alternate; }

        .sport-game-status { font-size: 0.65rem; color: var(--text-muted); font-weight: 500; margin-top: 0.1rem; }
      
        .sport-toggle-icon { font-size: 0.8rem; font-weight: 400; color: var(--text-muted); transition: transform 0.3s ease; margin-left: 2px; }
        .score-details.open .sport-toggle-icon { transform: rotate(45deg); }

        /* Lineup Display */
        .sport-lineup-display {
            display: flex; justify-content: flex-start; align-items: flex-start; gap: 0.75rem; overflow-x: auto;
            padding: 0.75rem 0 0 0; border-top: 1px solid var(--border-subtle); margin-top: 0.75rem;
        }
        .sport-lineup-player { display: flex; flex-direction: column; align-items: center; text-align: center; width: 45px; flex-shrink: 0; }
      
        .sport-player-avatar-container { position: relative; width: 35px; height: 35px; margin-bottom: 0.3rem; }
        .sport-player-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-subtle); background-color: #000; }
        .sport-player-multiplier { position: absolute; top: -3px; left: -3px; background: var(--bg-navy); color: #fff; border-radius: 50%; padding: 0.1rem 0.25rem; font-size: 0.55rem; font-weight: bold; border: 1px solid var(--border-subtle); line-height: 1; }
        .sport-player-info { font-size: 0.6rem; line-height: 1.2; }
        .sport-player-display-name { font-weight: 500; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; color: var(--text-main); }

        /* Player Display in Card */
        .sport-players-container { display: none; grid-template-columns: 1fr; gap: 1rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-subtle); }
        .sport-players-container.open { display: grid; }

        .team-players-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .team-players-list-header { font-size: 0.9rem; font-weight: 500; color: var(--gold-light); margin-bottom: 0.25rem; text-align: left; }

        .sport-player-card {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 0.75rem;
            border: 1px solid var(--border-subtle);
            text-align: left;
        }
        .sport-player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .sport-player-name { font-size: 0.9rem; font-weight: 500; color: var(--text-main); flex: 1; margin-right: 0.5rem; }
        .sport-player-score-rank-container { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
        .sport-player-score { font-size: 0.9rem; font-weight: 600; color: var(--gold-mid); line-height: 1.2; }
        .sport-player-rank { font-size: 0.7rem; font-weight: 400; color: var(--text-muted); line-height: 1.2; }

        .sport-card.total-card { margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border-gold); }
        .sport-card.total-card.loading .score-details { opacity: 0.5; cursor: default; }

        /* Duplicate Styles */
        .duplicate-clickable { cursor: pointer; transition: all 0.2s ease; }
        .duplicate-clickable:hover { opacity: 0.7; }
        .sport-player-card.duplicate-lineup { border: 2px solid var(--danger); box-shadow: 0 0 8px rgba(244, 67, 54, 0.7); cursor: pointer; }
        .sport-player-card.duplicate-lineup:hover { background: rgba(244, 67, 54, 0.1); box-shadow: 0 0 12px rgba(244, 67, 54, 1); }
        .player-card-modal.duplicate-lineup { border: 2px solid var(--danger); box-shadow: 0 0 5px var(--danger); }

        .no-games { background: var(--bg-card); border-radius: 12px; padding: 3rem; color: var(--text-muted); font-size: 1.2rem; text-align: center; }

        /* Modal Styles */
        .modal-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 1rem; animation: fadeIn 0.3s;
        }
        .modal {
            background: var(--bg-navy-light); border-radius: 16px; padding: 1.5rem; max-width: 800px; width: 100%;
            max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-gold); animation: popupSlideIn 0.3s ease-out;
        }
        .close-btn {
            position: absolute; top: 0.75rem; right: 0.75rem; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);
            width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: all 0.2s ease; background: rgba(255, 255, 255, 0.05);
        }
        .close-btn:hover { color: #ffffff; background: var(--bg-navy); }
        .modal h2 { font-size: 1.3rem; margin-bottom: 1.5rem; font-weight: 400; color: var(--gold-light); }
        .lineup-container { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .lineup-team { background: var(--bg-navy); border-radius: 12px; padding: 1rem; border: 1px solid var(--border-subtle); }
        .lineup-team h3 { font-size: 1.1rem; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border-subtle); font-weight: 500; color: var(--text-main); }
      
        .player-card-modal { display: flex; flex-direction: column; align-items: stretch; padding: .75rem; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: .75rem; border: 1px solid var(--border-subtle); }
        .player-summary { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .player-info-modal { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .player-name { font-weight: 500; font-size: 0.9rem; color: var(--text-main); }
        .player-sport-scores { margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid var(--border-subtle); font-size: 0.75rem; color: var(--text-muted); width: 100%; text-align: left; white-space: normal; }
        .sport-score { margin-right: 0.75em; display: inline-block; margin-bottom: 0.25em; }
        .sport-score .error { color: var(--danger); }
        .player-total-score { font-weight: 600; color: var(--gold-mid); font-size: 1rem; }

        /* Responsive Adjustments */
        @media (min-width: 768px) {
            .dropdown-header {
                grid-template-columns: 50px 1fr auto 1fr 50px;
                gap: 1.5rem;
                padding: 1.25rem 1.5rem;
            }
            .header-team-name { font-size: 1.2rem; }
            .header-series-score { font-size: 1.8rem; }
        
            .sport-card { padding: 1rem 1.5rem; }
            .sport-card .score-details {
                grid-template-columns: 40px 1fr auto 1fr 40px;
                gap: 1rem;
            }
            .sport-team-name { font-size: 1rem; }
            .sport-card .team-score { font-size: 1.3rem; }
        
            .sport-lineup-player { width: 50px; }
            .sport-player-avatar-container { width: 40px; height: 40px; }
            .sport-player-info { font-size: 0.7rem; }
            .sport-player-multiplier { font-size: 0.6rem; }
            .sport-players-container { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
            .sport-player-name { font-size: 1rem; }
            .sport-player-score { font-size: 1rem; }
            .team-players-list-header { font-size: 1rem; }
            .lineup-container { grid-template-columns: 1fr 1fr; }
            .modal { padding: 2rem; }
            .modal h2 { font-size: 1.5rem; }
            .lineup-team { padding: 1.5rem; }
            .lineup-team h3 { font-size: 1.3rem; }
            .player-name { font-size: 1rem; }
            .player-sport-scores { font-size: 0.8rem; }
            .player-total-score { font-size: 1.1rem; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { opacity: .7 } 100% { opacity: 1 } }
        @keyframes popupSlideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
   
    <!-- Required for Hashids Token Generation -->
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>
    <h1>RDA Live</h1>
   
    <!-- Sub-Navigation for Tabs -->
    <div class="sub-nav-container">
        <button class="sub-nav-btn active" id="tab-live" onclick="switchTab('live')">Team Matchups</button>
        <button class="sub-nav-btn" id="tab-leaderboard" onclick="switchTab('leaderboard')">Daily Leaderboard</button>
    </div>

    <div id="loading">Loading live scores...</div>
   
    <!-- View 1: Team Matchups -->
    <div id="results" class="content-view active"></div>

    <!-- View 2: Leaderboard -->
    <div id="leaderboard-results" class="content-view">
        <div class="leaderboard-card">
            <div class="leaderboard-header">
                <div class="leaderboard-title">
                    <span>Daily Leaderboard</span>
                </div>
                <div>📊</div>
            </div>
            <div class="leaderboard-table-container">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th style="text-align: right;">Total Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
        <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;">
            Scores are calculated from today's active drafts across all players.
        </p>
    </div>

    <!-- Lineup Modal (Team View) -->
    <div class="modal-bg" id="lineup-modal">
        <div class="modal">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Lineups</h2>
            <div class="lineup-container" id="modal-body">
                <!-- Team lineups will be injected here -->
            </div>
        </div>
    </div>

    <!-- Duplicate Info Modal -->
    <div class="modal-bg" id="duplicate-modal" style="justify-content: center; align-items: center;">
        <div class="modal" style="max-width: 400px; max-height: 50vh;">
            <span class="close-btn" id="close-duplicate-modal">&times;</span>
            <h2 id="duplicate-modal-title">Duplicate Lineup</h2>
            <div id="duplicate-modal-body" style="color: #eee; padding-top: 1rem; line-height: 1.5;">
                <!-- Message will be injected here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initNav, currentSeason } from './js/app.js';
      
        // Initialize Global Nav
        initNav();

        const workerProxy = 'https://rda-worker.coledecker04.workers.dev/';
      
        // --- AUTH & HEADERS CONFIGURATION ---
        const REAL_AUTH_TOKEN = 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f';
        const REAL_VERSION = '27';
        const DEVICE_UUID = crypto.randomUUID();

        function generateRequestToken() {
            const timestampMs = Date.now();
            // Using Hashids library loaded via script tag
            // @ts-ignore
            const hasher = new Hashids("realwebapp", 16);
            return hasher.encode(timestampMs);
        }

        // Robust Team Logo Helper
        function getTeamLogoPath(name) {
            if (!name) return 'https://placehold.co/50x50/0a0a0a/fff?text=?';
            let cleanName = name.trim().toLowerCase();
            if (cleanName.startsWith('the ')) cleanName = cleanName.substring(4);
            cleanName = cleanName.replace(/\s+/g, '-');
            
            const isPng = ['reapers', 'zombies', 'free-agents', 'east-all-stars', 'west-all-stars'].includes(cleanName);
            return `images/teams/${cleanName}-logo${isPng ? '.png' : '.PNG'}`;
        }

        // Universal Name Normalizer to safely match players regardless of formatting or "@"
        const normalizeName = (name) => name ? name.toString().replace(/^@/, '').trim().toLowerCase() : '';
      
        // Robust ID normalizer to fix Google Sheets invisible spaces (Case Sensitive!)
        const cleanId = (id) => id ? String(id).trim() : null;

        const seasonConfigs = {
            '4': {
                players: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7pZmpj4lJiBMkcjcgzJ77n2xmFIRlmuD-0Zuakz8lZekYobXkmTjfaEwhJYdNuM5F9VKlDm-FPaw8/pub?output=csv',
                schedule: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS93Cbk4JUmCBgtIR1-RnSHlYY9E-dxEEWVT_Jx-T_Lm07oa6KYlnBGAqaGJin4VBpG4GmOGn8ktTPy/pub?gid=1921814921&single=true&output=csv'
            },
            '5': {
                players: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7pZmpj4lJiBMkcjcgzJ77n2xmFIRlmuD-0Zuakz8lZekYobXkmTjfaEwhJYdNuM5F9VKlDm-FPaw8/pub?output=csv',
                schedule: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS93Cbk4JUmCBgtIR1-RnSHlYY9E-dxEEWVT_Jx-T_Lm07oa6KYlnBGAqaGJin4VBpG4GmOGn8ktTPy/pub?gid=44168754&single=true&output=csv'
            }
        };

        const config = seasonConfigs[currentSeason] || seasonConfigs['5'];

        // Globals
        const modal = document.getElementById('lineup-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const closeModalBtn = modal.querySelector('.close-btn');

        const duplicateModal = document.getElementById('duplicate-modal');
        const duplicateModalTitle = document.getElementById('duplicate-modal-title');
        const duplicateModalBody = document.getElementById('duplicate-modal-body');
        const closeDuplicateModalBtn = document.getElementById('close-duplicate-modal');

        let teamsDataCache = {};
        let playersToFetch = {};
        let dailyMatchups = [];
      
        window.switchTab = (tabName) => {
            document.querySelectorAll('.content-view').forEach(el => {
                el.classList.remove('active');
                el.style.display = ''; // Reset inline display styles
            });
            
            if (tabName === 'live') {
                document.getElementById('results').classList.add('active');
            } else if (tabName === 'leaderboard') {
                document.getElementById('leaderboard-results').classList.add('active');
                renderLeaderboardUI();
            }
            
            document.querySelectorAll('.sub-nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
        };

        closeModalBtn.onclick = () => { 
            modal.style.display = "none"; 
            document.body.classList.remove('modal-open'); 
        };

        closeDuplicateModalBtn.onclick = () => { 
            duplicateModal.style.display = "none"; 
            if (modal.style.display !== "flex") document.body.classList.remove('modal-open'); 
        };

        window.onclick = (e) => {
            if (e.target == modal) { 
                modal.style.display = "none"; 
                document.body.classList.remove('modal-open'); 
            }
            if (e.target == duplicateModal) { 
                duplicateModal.style.display = "none"; 
                if (modal.style.display !== "flex") document.body.classList.remove('modal-open'); 
            }
        };

        window.showDuplicateInfo = (sport, duplicateWithUsernames) => {
            duplicateModalTitle.textContent = `Duplicate ${sport} Lineup`;
            if (duplicateWithUsernames && duplicateWithUsernames.length > 0) {
                let names = duplicateWithUsernames.join(', ');
                duplicateModalBody.innerHTML = `This lineup violates duplicate rules. It is identical to the one submitted by: <strong style="color: #fff;">${names}</strong>.`;
            } else {
                duplicateModalBody.innerHTML = `This lineup violates duplicate rules.`;
            }
            duplicateModal.style.display = "flex";
            document.body.classList.add('modal-open');

        function showLineupModal(team1, team2) {

        function base64ToText(base64String) {
            if (!base64String) return '';
            try {
                const binStr = atob(base64String);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch (e) {
                console.error("Base64 decode failed:", e);
                return '';
            }
        }

        async function fetchBatchViaWorker(urls) {
            const queryParams = new URLSearchParams();
            for (const url of urls) queryParams.append('url', url);
            
            const urlString = workerProxy.endsWith('?') ? workerProxy + queryParams.toString() : workerProxy + '?' + queryParams.toString();
            
            const fetchOptions = {
                headers: {
                    'real-auth-info': REAL_AUTH_TOKEN,
                    'real-device-name': 'Chrome on Web',
                    'real-device-type': 'desktop_web',
                    'real-device-uuid': DEVICE_UUID,
                    'real-request-token': generateRequestToken(),
                    'real-version': REAL_VERSION
                }
            };
            
            try {
                const res = await fetch(urlString, fetchOptions);
                if (!res.ok) {
                    const text = await res.text();
                    console.error(`[Worker Proxy] Returned Error ${res.status}:`, text);
                    throw new Error(`Worker returned HTTP ${res.status}`);
                }
                return res.json();
            } catch (error) {
                console.error("[Worker Proxy] Fetch completely failed:", error);
                throw error;
            }
        }

        async function fetchCSV(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Fetch error for CSV`);
                const text = await res.text();
                return text.split('\n').map(line => {
                    const cleanedLine = line.trim();
                    if (cleanedLine.length === 0) return [];
                    const values = [];
                    let currentVal = '', inQuotes = false;
                    for (let i = 0; i < cleanedLine.length; i++) {
                        const char = cleanedLine[i];
                        if (char === '"' && (i === 0 || cleanedLine[i-1] !== '\\')) {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) { 
                            values.push(currentVal.trim()); 
                            currentVal = ''; 
                        } else {
                            currentVal += char;
                        }
                    }
                    values.push(currentVal.trim());
                    return values;
                }).filter(row => row.length > 0 && row.some(cell => cell && cell.length > 0));
            } catch (e) {
                console.warn("Failed to fetch CSV:", e);
                return [];
            }
        }

        function getCurrentDateStringEST() {
            const now = new Date();
            const options = { timeZone: "America/New_York", year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', hour12: false };
            const parts = new Intl.DateTimeFormat('en-US', options).formatToParts(now);
            const partValue = (type) => parts.find(p => p.type === type)?.value;
            let month = parseInt(partValue('month'));
            let day = parseInt(partValue('day'));
            let hour = parseInt(partValue('hour'));
            
            if (hour === 24) hour = 0;
            if (hour < 12) {
                const estDate = new Date(Date.UTC(parseInt(partValue('year')), month - 1, day));
                estDate.setUTCDate(estDate.getUTCDate() - 1);
                month = estDate.getUTCMonth() + 1; 
                day = estDate.getUTCDate();
            }
            return `${month}/${day}`;
        }

                        const did = row[sportIndices[s]]?.trim();
                        if(did) {
                            allScoreUrls.push({
                                url: `https://web.realsports.io/games/playerratingcontest/${did}/view/${userId}?contestType=sport&source=home`,
                                userId,
                                sport: s,
                                retries: 0
                            });
                        }
                    }
                });

                // NOW we can safely render the placeholders with proper team logos included.
                renderTeamMatchupUI(true);

                // --- HIGH-SPEED SEQUENTIAL QUEUE ---
                const chunkSize = 3;
                let queue = [...allScoreUrls];
                const totalRequests = queue.length;
                let loaded = 0;

                while (queue.length > 0) {
                    const chunk = queue.splice(0, chunkSize);
                    
                    try {
                        const results = await fetchBatchViaWorker(chunk.map(c => c.url));
                        
                        if (!Array.isArray(results)) {
                             throw new Error("Worker responded but the format was not an array. Check Auth Token!");
                        }

                        let hitRateLimit = false;

                        results.forEach((res, idx) => {
                            const reqData = chunk[idx];
                            const pData = playersToFetch[reqData.userId];
                            
                            if(!pData) return;
                            
                            if(res.status === 200) {
                                try {
                                    const data = JSON.parse(base64ToText(res.body));
                                    
                                    // Robust Score & Rank extraction
                                    let scoreDisplay = '0';
                                    let rankDisplay = '';
                                    if (data.info?.rankDisplayInfos?.length > 0) {
                                        scoreDisplay = data.info.rankDisplayInfos[0].scoreDisplay || '0';
                                        rankDisplay = data.info.rankDisplayInfos[0].rankDisplay || '';
                                    } else if (data.rankDisplayInfos?.length > 0) {
                                        scoreDisplay = data.rankDisplayInfos[0].scoreDisplay || '0';
                                        rankDisplay = data.rankDisplayInfos[0].rankDisplay || '';
                                    } else if (data.scoreDisplay) {
                                        scoreDisplay = data.scoreDisplay;
                                        rankDisplay = data.rankDisplay || '';
                                    }
                                    pData.scoresBySport[reqData.sport] = parseFloat(scoreDisplay || '0');
                                    pData.ranksBySport[reqData.sport] = rankDisplay;
                                    
                                    // Robust Lineup Extraction to account for different potential API models
                                    let extractedLineup = data.lineup || data.playerLineups || data.contestPlayerLineup || data.lineups || [];
                                    if (!Array.isArray(extractedLineup)) {
                                        if (extractedLineup.players) extractedLineup = extractedLineup.players;
                                        else if (extractedLineup.items) extractedLineup = extractedLineup.items;
                                        else extractedLineup = [];
                                    }
                                    pData.lineupsBySport[reqData.sport] = Array.isArray(extractedLineup) ? extractedLineup : [];
                                    
                                    // Always override username with the live API username to ensure name changes are reflected globally
                                    if(data.info?.user?.userName || data.user?.userName) {
                                        pData.username = data.info?.user?.userName || data.user?.userName;
                                    }
                                    loaded++;
                                } catch(e) {
                                    pData.scoresBySport[reqData.sport] = 'Error';
                                    pData.error = true;
                                    loaded++;
                                }
                            } else if (res.status === 429 && reqData.retries < 3) {
                                reqData.retries++;
                                queue.push(reqData);
                                hitRateLimit = true;
                            } else {
                                pData.scoresBySport[reqData.sport] = 'Error';
                                pData.error = true;
                                pData.errorDetails[reqData.sport] = res.status;
                                if (res.status === 401 || res.status === 403 || res.status === 429) {
                                    globalAuthErrorEncountered = true;
                                }
                                loaded++;
                            }
                        });

                        loadingDiv.textContent = `Loading live scores... ${loaded}/${totalRequests}`;
                        Object.values(playersToFetch).forEach(p => {
                            p.totalScore = Object.entries(p.scoresBySport).reduce((sum, [s, sc]) => {
                                return sum + (s.toUpperCase() !== 'USER' && s.toUpperCase() !== 'DRAFT' && s.toUpperCase() !== 'SPORT' && typeof sc === 'number' ? sc : 0);
                            }, 0);
                        });
                        
                        // Pass true for isLoading, but UI will now incrementally render
                        renderTeamMatchupUI(true, globalAuthErrorEncountered);

                        // Dynamic pacing
                        if (hitRateLimit) {
                            await new Promise(r => setTimeout(r, 3000));
                        } else if (queue.length > 0) {
                            await new Promise(r => setTimeout(r, 300));
                        }

                    } catch(e) {
                        chunk.forEach(reqData => {
                            const pData = playersToFetch[reqData.userId];
                            if(pData) {
                                pData.scoresBySport[reqData.sport] = 'Error';
                                pData.error = true;
                            }
                            loaded++;
                        });
                    }
                }

                // Duplicate Check - More robust API structure mapping here too
                const hashes = new Map();
                Object.values(playersToFetch).forEach(p => {
                    for(const s in p.lineupsBySport) {
                        if(s.toUpperCase() === 'DRAFT' || s.toUpperCase() === 'SPORT' || s.toUpperCase() === 'USER') continue;
                        const l = p.lineupsBySport[s];
                        if(!Array.isArray(l) || !l.length) continue;
                        const h = `${s}:${l.map(x => {
                            const lp = x.player || x;
                            return (lp.displayName || x.displayName || lp.name || x.name || '').trim();
                        }).join(',')}`;
                        if(!hashes.has(h)) hashes.set(h, []);
                        hashes.get(h).push({player: p, sport: s});
                    }
                });

                for(const entries of hashes.values()) {
                    if(entries.length <= 1) continue;
                    for(let i=0; i < entries.length; i++) {
                        const curr = entries[i], violators = new Set();
                        for(let j=0; j < entries.length; j++) {
                            if(i === j) continue;
                            const other = entries[j];
                            if(curr.player.team === other.player.team) violators.add(other.player.username);
                            if(draftUserIds.has(other.player.userId)) {
                                if(other.player.userId !== 'WJqLyqAn' || curr.sport === 'NHL') violators.add(other.player.username);
                            }
                        }
                        if(violators.size > 0) {
                            curr.player.isDuplicate[curr.sport] = true;
                            curr.player.duplicateWith[curr.sport] = [...violators];
                        }
                    }
                }

                renderTeamMatchupUI(false, globalAuthErrorEncountered);
                loadingDiv.style.display = 'none';

            } catch (e) {
                console.error("[CRITICAL FAILURE]", e);
                loadingDiv.style.display = 'none';
                document.getElementById('results').innerHTML = `<div class="no-games">Failed to load: ${e.message}</div>`;
            }
        }

        main();
    </script>
</body>
</html>
